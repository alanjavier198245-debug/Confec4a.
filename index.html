<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFECCIONES 4A</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
font-family:'Poppins',sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
overflow-x:hidden;
padding:20px;

background:linear-gradient(-45deg,#ffffff,#ffe4e1,#ffd6a5,#d0f4ff,#f3e5f5);
background-size:400% 400%;
animation:fondoRapido 8s ease infinite;
}

/* fondo animado */

@keyframes fondoRapido{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* efecto luz */

body::after{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.4),transparent 60%);
animation:luzLujo 6s infinite alternate ease-in-out;
z-index:-1;
}

@keyframes luzLujo{
from{transform:translate(-10%,-10%);}
to{transform:translate(10%,10%);}
}

/* logo */

.logo{
position:absolute;
top:20px;
left:20px;
width:clamp(45px,6vw,70px);
}

/* contenido */

.contenido{
margin-top:10vh;
animation:aparecer 1.5s ease;
max-width:800px;
}

/* titulo */

.titulo{
font-family:'Playfair Display',serif;
font-size:clamp(40px,6vw,72px);
letter-spacing:4px;
color:#c40000;

text-shadow:
0 4px 8px rgba(0,0,0,0.25),
0 8px 20px rgba(0,0,0,0.15);
}

.titulo span{
font-size:inherit;
}

/* eslogan */

.eslogan{
margin-top:15px;
font-size:clamp(18px,2.5vw,27px);
font-weight:300;
color:#c40000;
}

/* redes */

.redes{
position:absolute;
bottom:25px;
left:25px;
display:flex;
gap:15px;
}

.redes img{
width:clamp(32px,4vw,45px);
transition:transform .3s;
}

.redes img:hover{
transform:scale(1.15);
}

/* boton catalogo */

.boton{
position:absolute;
bottom:25px;
right:25px;

padding:14px 40px;

background:#ff007f;
color:white;
text-decoration:none;
border-radius:30px;
font-weight:500;

transition:.3s;
}

.boton:hover{
transform:scale(1.08);
}

/* animacion entrada */

@keyframes aparecer{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

/* ==================== */
/* VERSION MOVIL */
/* ==================== */

@media(max-width:768px){

.logo{
position:relative;
top:auto;
left:auto;
margin-bottom:20px;
}

.contenido{
margin-top:20px;
}

.redes{
position:relative;
bottom:auto;
left:auto;
margin-top:40px;
justify-content:center;
}

.boton{
position:relative;
bottom:auto;
right:auto;
display:inline-block;
margin-top:30px;
}

}

</style>
</head>

<body>

<img src="logo.png" class="logo" alt="Logo">

<div class="contenido">

<div class="titulo">
CONFECCIONES <span>4</span>A
</div>

<div class="eslogan">
Calidad, estilo y dedicación en cada prenda.
</div>

</div>

<div class="redes">

<a href="https://wa.me/595992178220" target="_blank">
<img src="whatsapp.png">
</a>

<a href="https://www.facebook.com/profile.php?id=61585522679491" target="_blank">
<img src="facebook.png">
</a>

<a href="https://www.instagram.com/confecciones.4a/" target="_blank">
<img src="instagram.png">
</a>

<a href="https://www.tiktok.com/@confec.4a" target="_blank">
<img src="tiktok.png">
</a>

</div>

<a href="catalogo.html" class="boton">
Ver Catálogo
</a>

</body>
</html>
